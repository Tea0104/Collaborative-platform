<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业中心 - 多角色共创平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/theme.css">
    <link rel="stylesheet" href="./styles/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", "Microsoft YaHei", sans-serif; }
        body { background: #f5f7fa; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: linear-gradient(135deg, #2c7be5 0%, #1c5bb8 100%); color: #fff; padding: 15px 0; box-shadow: 0 4px 12px rgba(0,0,0,.1); position: sticky; top: 0; z-index: 100; }
        .header-container { display: flex; justify-content: space-between; align-items: center; }
        .logo h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; }
        .header-actions { display: flex; align-items: center; gap: 12px; }
        .back-link { color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .logout-btn { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.35); padding: 8px 14px; border-radius: 6px; cursor: pointer; }
        .page-title { margin: 24px 0 8px; font-size: 28px; color: #1f2937; }
        .page-desc { color: #6b7280; margin-bottom: 18px; }
        .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); margin-bottom: 24px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 4px 14px rgba(0,0,0,.06); }
        .card h2 { font-size: 20px; color: #2563eb; margin-bottom: 14px; }
        .list { margin-top: 10px; display: grid; gap: 10px; }
        .item { background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 10px; padding: 12px; display: flex; justify-content: space-between; gap: 10px; align-items: center; }
        .item-main { min-width: 0; }
        .item-title { font-weight: 600; color: #111827; }
        .item-sub { color: #6b7280; font-size: 13px; }
        .item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { border: none; border-radius: 8px; padding: 10px 14px; cursor: pointer; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #eef2ff; color: #1d4ed8; }
        .btn-secondary:hover { background: #dbeafe; }
        .btn-sm { padding: 6px 10px; font-size: 12px; }
        .entry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
        .entry-link { border: 1px solid #dbeafe; background: #eff6ff; color: #1d4ed8; border-radius: 10px; padding: 14px; text-decoration: none; display: flex; align-items: center; gap: 8px; font-weight: 600; }
        .entry-link:hover { background: #dbeafe; }
        .empty { color: #6b7280; font-size: 14px; }
        .msg { margin-top: 10px; padding: 10px; border-radius: 8px; font-size: 14px; display: none; }
        .msg.ok { background: #dcfce7; color: #166534; display: block; }
        .msg.err { background: #fee2e2; color: #991b1b; display: block; }
    </style>
</head>
<body class="page">
<header>
    <div class="container header-container">
        <div class="logo">
            <h1><i class="fas fa-building"></i> 企业中心</h1>
        </div>
        <div class="header-actions">
            <a class="back-link" href="project_list.html"><i class="fas fa-arrow-left"></i> 返回项目列表</a>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
</header>

<main class="container page-container">
    <h1 class="page-title">企业中心首页</h1>
    <p class="page-desc">请选择入口，或直接管理你已发布的项目。</p>

    <section class="card" style="margin-bottom: 24px;">
        <h2><i class="fas fa-compass"></i> 导航入口</h2>
        <div class="entry-grid">
            <a class="entry-link" href="/enterprisecenter/publish"><i class="fas fa-plus-circle"></i> 项目发布</a>
            <a class="entry-link" href="/enterprisecenter/roles"><i class="fas fa-user-tag"></i> 添加角色</a>
            <a class="entry-link" href="/enterprisecenter/review"><i class="fas fa-clipboard-check"></i> 申请批阅</a>
        </div>
    </section>

    <section class="card">
        <h2><i class="fas fa-list"></i> 我发布的项目</h2>
        <div id="projects-list" class="list"></div>
        <div id="projects-msg" class="msg"></div>
    </section>
</main>

<script src="./js/common.js"></script>
<script>
    const API_BASE = (() => {
        const configured = (localStorage.getItem("api_base") || "").trim();
        if (configured) return configured;
        const host = window.location.hostname;
        if (host === "localhost" || host === "127.0.0.1") return "http://127.0.0.1:5000";
        return "";
    })();
    const token = localStorage.getItem("auth_token") || localStorage.getItem("token") || "";
    const userType = localStorage.getItem("user_type") || "";

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/\"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function showMsg(id, ok, text) {
        const el = document.getElementById(id);
        el.className = `msg ${ok ? "ok" : "err"}`;
        el.textContent = text;
    }

    function asEnterprise() {
        return ["企业", "company", "Company"].includes(userType);
    }

    async function apiFetch(path, options = {}) {
        const headers = options.headers || {};
        if (token) headers.Authorization = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok || data.success === false) {
            throw new Error(data.message || "请求失败");
        }
        return data;
    }

    async function logout() {
        const authToken = localStorage.getItem("auth_token") || localStorage.getItem("token") || "";
        if (authToken) {
            try {
                await fetch(`${API_BASE}/api/auth/logout`, { method: "POST", headers: { Authorization: `Bearer ${authToken}` } });
            } catch (_) {}
        }
        localStorage.removeItem("auth_token");
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        localStorage.removeItem("user_type");
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }

    function formatDate(value) {
        if (!value) return "-";
        const d = new Date(String(value).replace(" ", "T"));
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("zh-CN", { hour12: false });
    }

    function renderProjectList(projects) {
        const list = document.getElementById("projects-list");
        if (!projects.length) {
            list.innerHTML = '<div class="empty">暂无已发布项目</div>';
            return;
        }
        list.innerHTML = projects.map((project) => {
            const projectId = Number(project.project_id) || 0;
            return `
                <div class="item">
                    <div class="item-main">
                        <div class="item-title">${escapeHtml(project.project_name || `项目${projectId}`)}</div>
                        <div class="item-sub">状态：${escapeHtml(project.project_status || "-")} | 发布时间：${escapeHtml(formatDate(project.publish_time))}</div>
                        <div class="item-sub">截止时间：${escapeHtml(formatDate(project.deadline))} | 公司：${escapeHtml(project.company || "-")}</div>
                    </div>
                    <div class="item-actions">
                        <a class="btn btn-sm btn-secondary" href="/enterprisecenter/projects/${projectId}"><i class="fas fa-arrow-right"></i> 查看详情/管理</a>
                    </div>
                </div>
            `;
        }).join("");
    }

    async function loadEnterpriseProjects() {
        const data = await apiFetch("/api/enterprise/projects");
        return Array.isArray(data.projects) ? data.projects : [];
    }

    async function initPage() {
        if (!token) {
            alert("请先登录企业账号");
            window.location.href = "login.html";
            return;
        }
        if (!asEnterprise()) {
            alert("只有企业账号可以访问企业中心");
            window.location.href = "project_list.html";
            return;
        }

        try {
            const projects = await loadEnterpriseProjects();
            renderProjectList(projects);
        } catch (err) {
            document.getElementById("projects-list").innerHTML = '<div class="empty">加载失败</div>';
            showMsg("projects-msg", false, err.message);
        }
    }

    window.logout = logout;
    initPage();
</script>
</body>
</html>
