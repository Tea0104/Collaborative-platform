<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成果反馈管理 - 企业端</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./styles/theme.css">
    <link rel="stylesheet" href="./styles/components.css">
    <style>
        body.page { background: #f5f7fa; color: #333; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
        header { background: linear-gradient(135deg, #2c7be5 0%, #1c5bb8 100%); color: #fff; padding: 15px 0; box-shadow: 0 4px 12px rgba(0,0,0,.1); position: sticky; top: 0; z-index: 100; }
        .header-container { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
        .logo h1 { font-size: 24px; display: flex; align-items: center; gap: 10px; margin: 0; }
        .header-actions { display: flex; align-items: center; gap: 10px; }
        .back-link { color: #fff; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .logout-btn { background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.35); padding: 8px 14px; border-radius: 6px; cursor: pointer; }
        .page-title { margin: 24px 0 8px; font-size: 28px; color: #1f2937; }
        .page-desc { color: #6b7280; margin-bottom: 16px; }
        .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 14px; }
        .meta { color: #6b7280; font-size: 14px; }
        .list { display: grid; gap: 12px; }
        .item { border: 1px solid #e5e7eb; border-radius: 12px; padding: 16px; background: #fff; box-shadow: 0 4px 12px rgba(0,0,0,.04); }
        .item-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .item-title { font-weight: 700; color: #111827; }
        .item-sub { color: #6b7280; font-size: 13px; margin-bottom: 6px; }
        .item-content { color: #1f2937; white-space: pre-wrap; margin: 10px 0; }
        .item-link a { color: #2563eb; text-decoration: none; }
        .item-link a:hover { text-decoration: underline; }
        .item-actions { display: flex; justify-content: flex-end; margin-top: 10px; }
        .empty { background: #fff; border: 1px dashed #d1d5db; color: #6b7280; border-radius: 10px; padding: 24px; text-align: center; }
        .msg { margin: 10px 0; padding: 10px 12px; border-radius: 8px; display: none; font-size: 14px; }
        .msg.ok { display: block; background: #dcfce7; color: #166534; }
        .msg.err { display: block; background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body class="page">
<header>
    <div class="container header-container">
        <div class="logo">
            <h1><i class="fas fa-comments"></i> 成果反馈管理</h1>
        </div>
        <div class="header-actions">
            <a class="back-link" href="/enterprisecenter"><i class="fas fa-arrow-left"></i> 返回企业中心</a>
            <button class="logout-btn btn btn-outline" onclick="logout()"><i class="fas fa-sign-out-alt"></i> 退出</button>
        </div>
    </div>
</header>

<main class="container page-container">
    <h1 class="page-title">待处理成果反馈</h1>
    <p class="page-desc">仅展示状态为 <code>submitted</code> 的反馈记录。</p>
    <div class="toolbar">
        <div class="meta">项目 ID：<strong id="project-id-text">-</strong></div>
        <button class="btn btn-secondary" id="refresh-btn"><i class="fas fa-rotate"></i> 刷新</button>
    </div>
    <div id="page-msg" class="msg"></div>
    <section class="card">
        <div class="card-body">
            <div id="feedback-list" class="list"></div>
        </div>
    </section>
</main>

<script src="./js/common.js"></script>
<script>
    const API_BASE = (window.CP && window.CP.getApiBase)
        ? window.CP.getApiBase()
        : (() => {
            const configured = (localStorage.getItem("api_base") || "").trim();
            if (configured) return configured;
            const host = window.location.hostname;
            if (host === "localhost" || host === "127.0.0.1") return "http://127.0.0.1:5000";
            return "";
        })();
    const token = (window.CP && window.CP.getToken)
        ? window.CP.getToken()
        : (localStorage.getItem("auth_token") || localStorage.getItem("token") || "");
    const userType = localStorage.getItem("user_type") || "";

    function escapeHtml(value) {
        return String(value || "")
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function asEnterprise() {
        return ["企业", "company", "Company", "浼佷笟"].includes(userType);
    }

    function showMsg(ok, text) {
        const el = document.getElementById("page-msg");
        el.className = `msg ${ok ? "ok" : "err"}`;
        el.textContent = text;
    }

    function getProjectId() {
        const params = new URLSearchParams(window.location.search);
        const id = params.get("project_id") || params.get("id");
        return /^\d+$/.test(String(id || "")) ? Number(id) : null;
    }

    async function apiFetch(path, options = {}) {
        const headers = options.headers || {};
        if (token) headers.Authorization = `Bearer ${token}`;
        const response = await fetch(`${API_BASE}${path}`, { ...options, headers });
        const data = await response.json();
        if (!response.ok || data.success === false || (typeof data.code !== "undefined" && data.code !== 200)) {
            throw new Error(data.message || data.msg || "请求失败");
        }
        return data;
    }

    function formatDate(value) {
        if (!value) return "-";
        const d = new Date(String(value).replace(" ", "T"));
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleString("zh-CN", { hour12: false });
    }

    function renderFeedbacks(items) {
        const listEl = document.getElementById("feedback-list");
        if (!items.length) {
            listEl.innerHTML = '<div class="empty">当前项目暂无待处理成果反馈</div>';
            return;
        }
        listEl.innerHTML = items.map((item) => {
            const feedbackId = Number(item.feedback_id) || 0;
            const roleText = item.role_name ? `角色：${escapeHtml(item.role_name)}` : `角色ID：${escapeHtml(item.role_id)}`;
            const evidence = (item.evidence_url || "").trim();
            return `
                <article class="item card" id="feedback-${feedbackId}">
                    <div class="item-top">
                        <div class="item-title">${roleText}</div>
                        <span class="badge badge-warning">${escapeHtml(item.status || "submitted")}</span>
                    </div>
                    <div class="item-sub">提交时间：${escapeHtml(formatDate(item.created_at))}</div>
                    <div class="item-sub">用户ID：${escapeHtml(item.user_id)}</div>
                    <div class="item-content">${escapeHtml(item.content || "")}</div>
                    <div class="item-link">${evidence ? `<a href="${escapeHtml(evidence)}" target="_blank" rel="noopener noreferrer">查看证据链接</a>` : "证据链接：无"}</div>
                    <div class="item-actions">
                        <button class="btn btn-primary" onclick="markProcessed(${feedbackId})">
                            <i class="fas fa-check"></i> 标记已处理
                        </button>
                    </div>
                </article>
            `;
        }).join("");
    }

    async function loadFeedbacks(projectId) {
        const data = await apiFetch(`/api/projects/${projectId}/feedbacks?status=submitted`);
        const rows = Array.isArray(data.feedbacks) ? data.feedbacks : [];
        renderFeedbacks(rows);
    }

    async function markProcessed(feedbackId) {
        try {
            await apiFetch(`/api/feedbacks/${feedbackId}/status`, {
                method: "PUT",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ status: "processed" })
            });
            const rowEl = document.getElementById(`feedback-${feedbackId}`);
            if (rowEl) rowEl.remove();
            if (!document.querySelector("#feedback-list .item")) {
                document.getElementById("feedback-list").innerHTML = '<div class="empty">当前项目暂无待处理成果反馈</div>';
            }
            showMsg(true, "已标记为 processed");
        } catch (err) {
            showMsg(false, err.message);
        }
    }

    async function logout() {
        const authToken = localStorage.getItem("auth_token") || localStorage.getItem("token") || "";
        if (authToken) {
            try {
                await fetch(`${API_BASE}/api/auth/logout`, { method: "POST", headers: { Authorization: `Bearer ${authToken}` } });
            } catch (_) {}
        }
        localStorage.removeItem("auth_token");
        localStorage.removeItem("token");
        localStorage.removeItem("username");
        localStorage.removeItem("user_type");
        localStorage.removeItem("user");
        window.location.href = "login.html";
    }

    async function initPage() {
        if (!token) {
            alert("请先登录企业账号");
            window.location.href = "login.html";
            return;
        }
        if (!asEnterprise()) {
            alert("只有企业账号可以访问该页面");
            window.location.href = "/enterprisecenter";
            return;
        }

        const projectId = getProjectId();
        const idTextEl = document.getElementById("project-id-text");
        if (!projectId) {
            idTextEl.textContent = "未提供";
            document.getElementById("feedback-list").innerHTML = '<div class="empty">缺少 project_id 参数</div>';
            showMsg(false, "请从企业中心选择项目进入，或通过 ?project_id=xx 访问");
            return;
        }

        idTextEl.textContent = String(projectId);
        try {
            await loadFeedbacks(projectId);
        } catch (err) {
            document.getElementById("feedback-list").innerHTML = '<div class="empty">加载失败</div>';
            showMsg(false, err.message);
        }

        document.getElementById("refresh-btn").addEventListener("click", async () => {
            try {
                await loadFeedbacks(projectId);
                showMsg(true, "刷新成功");
            } catch (err) {
                showMsg(false, err.message);
            }
        });
    }

    window.markProcessed = markProcessed;
    window.logout = logout;
    initPage();
</script>
</body>
</html>
