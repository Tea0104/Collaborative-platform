<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design System Demo</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <header class="navbar">
    <div class="container">
      <a class="nav-brand" href="#">
        <i class="fa-solid fa-layer-group"></i>
        多角色共创平台
      </a>
      <nav class="nav-links">
        <a class="nav-item is-active" href="#">首页</a>
        <a class="nav-item" href="#">项目</a>
        <a class="nav-item" href="#">团队</a>
      </nav>
    </div>
  </header>

  <main class="container section">
    <h1>设计系统示例</h1>
    <p>用于快速验收 theme + components 是否对齐现有精美页面风格。</p>

    <section class="grid" style="grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); margin-bottom: 24px;">
      <article class="card">
        <div class="card-header">
          <h3>按钮</h3>
        </div>
        <div class="card-body">
          <p>
            <button class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> 主按钮</button>
          </p>
          <p>
            <button class="btn btn-secondary">次按钮</button>
          </p>
          <p>
            <button class="btn btn-outline">描边按钮</button>
          </p>
          <p>
            <button class="btn btn-danger">危险按钮</button>
          </p>
        </div>
      </article>

      <article class="card">
        <div class="card-header">
          <h3>表单</h3>
        </div>
        <div class="card-body">
          <form class="form">
            <div class="form-group">
              <label class="label" for="demoName">项目名称</label>
              <input class="input" id="demoName" placeholder="请输入项目名称">
            </div>
            <div class="form-group">
              <label class="label" for="demoType">项目类型</label>
              <select class="select" id="demoType">
                <option>科研协作</option>
                <option>产品开发</option>
              </select>
            </div>
            <div class="form-group">
              <label class="label" for="demoDesc">简介</label>
              <textarea class="textarea" id="demoDesc" placeholder="请输入项目简介"></textarea>
            </div>
          </form>
        </div>
      </article>
    </section>

    <section class="card" style="margin-bottom: 24px;">
      <div class="card-header">
        <h3>徽章</h3>
      </div>
      <div class="card-body">
        <span class="badge badge-success">已通过</span>
        <span class="badge badge-warning">待评审</span>
        <span class="badge badge-danger">已关闭</span>
        <span class="badge badge-info">进行中</span>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h3>角色列表表格</h3>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>角色</th>
              <th>人数需求</th>
              <th>技能要求</th>
              <th>状态</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>前端开发</td>
              <td>2</td>
              <td>HTML / JS / API</td>
              <td><span class="badge badge-info">招募中</span></td>
            </tr>
            <tr>
              <td>算法工程师</td>
              <td>1</td>
              <td>Python / ML</td>
              <td><span class="badge badge-warning">面试中</span></td>
            </tr>
            <tr>
              <td>产品经理</td>
              <td>1</td>
              <td>需求分析 / 原型</td>
              <td><span class="badge badge-success">已满员</span></td>
            </tr>
          </tbody>
        </table>
      </div>
      <div class="card-footer">
        <button class="btn btn-primary">提交</button>
      </div>
    </section>
  </main>
</body>
</html>
